[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ainl-lang"
version = "1.0.0"
description = "AINL compiler, runtime, validator, and tooling"
readme = "README.md"
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0.0"]
web = ["fastapi", "uvicorn[standard]"]

[project.scripts]
ainl-validate = "scripts.validate_ainl:main"
ainl-validator-web = "scripts.validator_app:main"
ainl-generate-dataset = "scripts.generate_synthetic_dataset:main"
ainl-compat-report = "scripts.compat_report:main"
ainl-tool-api = "scripts.tool_api:main"
ainl-ollama-eval = "scripts.eval_ollama:main"
ainl-validate-examples = "scripts.validate_examples:main"

[tool.setuptools]
py-modules = [
  "compiler_v2",
  "runtime",
  "grammar_constraint",
  "run_tests_and_emit",
  "serve_dashboard",
]

[tool.setuptools.packages.find]
include = ["scripts*"]
