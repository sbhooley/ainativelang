name: Notify ainativelangweb content sync

# Push-triggered dispatch is disabled until `secrets.GH_PAT` can access
# `sbhooley/ainativelangweb` (repository_dispatch requires a PAT with repo scope
# on the target). Without it, the job fails with "Bad credentials".
# Restore automatic runs by uncommenting the `push:` block below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - "GROWTH-PLAN.md"
  #     - "README.md"
  #     - "docs/**"
  #     - "pyproject.toml"
  #     - "WHITEPAPERDRAFT.md"
  #     - "WHAT_IS_AINL.md"
  #     - "BENCHMARK.md"
  #     - "HOW_AINL_SAVES_MONEY.md"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify token can access target repo
        run: |
          set -euo pipefail
          curl -sS \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/sbhooley/ainativelangweb \
            | jq -r '.full_name, .private, .permissions'
      - name: Trigger ainativelangweb sync workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT }}
          repository: sbhooley/ainativelangweb
          event-type: ainl-docs-updated
