  examples:
    count: 103
    format: ".ainl under examples/ (real, compilable syntax)"

  http_server:
    command: "ainl serve --port 8080"
    endpoints:
      - "POST /validate"
      - "POST /compile"
      - "POST /run"
      - "GET /health"
    status: working
