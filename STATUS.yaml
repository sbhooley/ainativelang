marketing_claims_boundary:
  # Maps public claims to their actual status and evidence location.
  # Operators/agents: do NOT market a capability unless it appears here as "shipped".
  # See docs/operations/OPERATOR_MARKETING_GUARDRAILS.md for rules.

  wasm_adapter:
    claim: "AINL graphs can call WebAssembly modules"
    status: shipped
    evidence: "runtime/adapters/wasm.py; R wasm.CALL <module>.<export> in compact/opcode syntax"
    scope: "Call-out to pre-compiled .wasm/.wat modules via wasmtime. NOT whole-graph WASM emit."

  whole_graph_wasm_emit:
    claim: "AINL graphs compile to WebAssembly"
    status: never_shipped
    notes: "P5 research spike (wasm_subgraph_analysis) may explore deterministic subgraph emit. No ainl emit --target wasm exists."

  bare_metal_compilation:
    claim: "Graphs compile to bare metal / machine code"
    status: never
    notes: "AINL compiles .ainl to IR JSON, then executes via Python RuntimeEngine + adapters. No native codegen exists or is planned."

  tensor_type_system:
    claim: "Type checker rejects graphs with tensor/string mismatches"
    status: aspirational
    notes: "Compiler validates syntax, adapter names, and arity (--strict). No tensor/shape type system exists. Phase 2 adapter semantic contracts (P1) will add arg-shape checks for known adapters."

  ainl_estimate:
    claim: "Static compile-time LLM cost estimation"
    status: shipped
    evidence: "cli/main.py (ainl estimate); tooling/cost_estimate.py; docs/COST_ESTIMATOR.md; tests/test_cost_estimate.py"

  cost_estimator_cli:
    claim: "ainl estimate command for token cost analysis"
    status: shipped
    evidence: "cli/main.py line 3667+; ainl estimate <file> --model --format --runs-per-day"

  version_marketing:
    claim: "Version number reflects released features"
    status: policy
    notes: "Only pyproject.toml version is authoritative. Currently 1.8.1. Do not market v1.8.2 or higher until pyproject.toml is bumped."

  emit_targets:
    claim: "ainl emit --target produces downstream artifacts"
    status: shipped
    targets:
      - ir
      - langgraph
      - temporal
      - hermes-skill
      - hermes
      - solana-client
      - blockchain-client
      - server
      - python-api
      - react
      - openapi
      - prisma
      - sql
      - docker
      - k8s
      - cron
      - armaraos
    notes: "This list MUST match cli/main.py cmd_emit parser choices. No target not in this list may be claimed."

