# AINL emitted K8s (apply: kubectl apply -f -)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ainl-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ainl-api
  template:
    metadata:
      labels:
        app: ainl-api
    spec:
      containers:
      - name: api
        image: ainl-api:latest
        ports:
        - containerPort: 8765
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8765
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/ready
            port: 8765
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ainl-api
spec:
  selector:
    app: ainl-api
  ports:
  - port: 80
    targetPort: 8765
