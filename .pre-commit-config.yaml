# Install once: pip install pre-commit && pre-commit install
# Runs headline stat refresh when you change code that affects STATUS.yaml / AGENTS.md counts.
# CI workflow "Repo stats" is the backstop if hooks are not installed.

repos:
  - repo: local
    hooks:
      - id: refresh-repo-stats
        name: Refresh headline repo stats (STATUS.yaml / AGENTS.md)
        entry: python scripts/refresh_repo_stats.py
        language: system
        pass_filenames: false
        files: |
          (?x)^(
            compiler_v2\.py|
            ainl_preprocess\.py|
            STATUS\.yaml|
            AGENTS\.md|
            scripts/refresh_repo_stats\.py|
            (runtime|cli|adapters|tests|examples)/
          )
